name: Jobalots Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias y navegador
        run: npm install

      - name: Ejecutar bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node bot.js

      - name: Guardar seen.json en el repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Descartar TODOS los cambios excepto seen.json
          git checkout -- .
          git clean -fd
          # Ahora el árbol está limpio, añadir solo seen.json
          git add seen.json
          git diff --cached --quiet || git commit -m "chore: actualizar seen.json [skip ci]"
          git pull --rebase origin main
          git push
