name: Jobalots Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias y navegador
        run: npm install

      - name: Ejecutar bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node bot.js

      - name: Guardar seen.json en el repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Guardar seen.json fuera del repo temporalmente
          cp seen.json /tmp/seen.json
          # Limpiar árbol completamente
          git fetch origin main
          git reset --hard origin/main
          git clean -fd
          # Restaurar el seen.json actualizado por el bot
          cp /tmp/seen.json seen.json
          # Commitear y pushear
          git add seen.json
          git diff --cached --quiet || git commit -m "chore: actualizar seen.json [skip ci]"
          git push origin main
