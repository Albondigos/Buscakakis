name: Jobalots Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers (FIX REAL)
        run: |
          npx playwright install
          npx playwright install-deps

      - name: Verify install
        run: npx playwright --version

      - name: Run bot
        run: node scraper.js
